services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: predictpod-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=mongodb+srv://HalMan_db_user:Halcyon%4012%24@cluster0.ifvwnf.mongodb.net/HalcyonSecutity?retryWrites=true&w=majority
      - DB_NAME=predictpod
      - CORS_ORIGINS=https://autonomous-paper.preview.emergentagent.com,https://beta.predictpod.co,https://demo.predictpod.co,http://localhost:3000,http://localhost:80,https://localhost:443,https://alpha.predictpod.co,https://alphaapi.predictpod.co
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: predictpod-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy


volumes:
  backend_logs:

networks:
  default:
    name: predictpod-network
