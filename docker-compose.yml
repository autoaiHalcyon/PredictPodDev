services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: predictpod-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb+srv://HalMan_db_user:Halcyon%4012%24@cluster0.ifvwnf.mongodb.net/HalcyonSecutity?retryWrites=true&w=majority
      - DB_NAME=predictpod
      - CORS_ORIGINS=*
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: predictpod-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8000

volumes:
  backend_logs:

networks:
  default:
    name: predictpod-network
